<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Leitor</title>


<style>

html{
scroll-behavior:smooth;
}


body{

margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;

}


header{

background:#222;
padding:20px;
text-align:center;
position:sticky;
top:0;
z-index:10;

}


h1{

color:#ffcc00;

}


.progresso{

background:#333;
padding:10px;
text-align:center;

}



.barra{

height:10px;
background:#ffcc00;
width:0%;

}



.controles{

text-align:center;
padding:15px;

}



button{

background:#ffcc00;
color:#111;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}



a{

text-decoration:none;

}



.voltar{

background:white;
color:#111;
padding:10px;
border-radius:8px;

}



.leitor{

max-width:900px;
margin:auto;

}



.pagina{

margin-bottom:20px;
text-align:center;

}



.pagina img{

width:100%;
display:block;

}




.topo{

position:fixed;
bottom:20px;
right:20px;
display:none;

}



</style>


</head>



<body>



<header>


<h1>📖 Animix</h1>


<h2 id="titulo"></h2>


</header>





<div class="progresso">


<div id="barra" class="barra">

</div>


</div>





<div class="controles">


<a class="voltar" href="index.html">

🏠 Início

</a>


</div>





<div class="leitor" id="leitor">

</div>




<button class="topo" id="topo" onclick="topoPagina()">

⬆

</button>








<script src="dados.js"></script>



<script>



let url =

new URLSearchParams(window.location.search);



let id =

Number(url.get("id"));



let cap =

Number(url.get("cap"));



let manga =

mangas[id];





let capitulo =

manga.capitulos.find(

item=>item.numero===cap

);






document.getElementById("titulo").innerHTML =

manga.nome+

" - Capítulo "+

cap;






// HISTÓRICO


localStorage.setItem(

"ultimoLido",

JSON.stringify({

manga:manga.nome,

id:id,

capitulo:cap

})

);







let leitor =

document.getElementById("leitor");





capitulo.paginas.forEach(function(pagina,index){



leitor.innerHTML += `


<div class="pagina" id="pagina${index}">


<p>

Página ${index+1}

</p>



<img src="${pagina}" onclick="salvarPagina(${index})">


</div>



`;



});







function salvarPagina(pagina){



localStorage.setItem(

"ultimaPagina",

pagina

);



}



window.onscroll=function(){



let altura =

document.documentElement.scrollHeight -

document.documentElement.clientHeight;



let atual =

window.scrollY;



let porcentagem =

(atual/altura)*100;



document.getElementById("barra").style.width =

porcentagem+"%";





if(atual>300){


document.getElementById("topo").style.display="block";


}

else{


document.getElementById("topo").style.display="none";


}



}







function topoPagina(){


window.scrollTo(0,0);


}



</script>



</body>

</html>
