<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Leitor</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    background: #222;
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 0;
}

h1 {
    color: #ffcc00;
}

.controles {
    text-align: center;
    padding: 15px;
}

button {
    background: #ffcc00;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
}

.leitor {
    max-width: 900px;
    margin: auto;
    text-align: center;
}

.pagina {
    width: 100%;
    margin-bottom: 10px;
}

.pagina img {
    width: 100%;
    display: block;
}

</style>

</head>

<body>

<header>
<h1>📖 Animix</h1>
<h2>Mangá Exemplo - Capítulo 1</h2>
</header>

<div class="controles">
<button>⬅ Capítulo anterior</button>
<button>Próximo capítulo ➡</button>
</div>


<div class="leitor">

<div class="pagina">
<img src="https://via.placeholder.com/800x1200?text=Página+1">
</div>

<div class="pagina">
<img src="https://via.placeholder.com/800x1200?text=Página+2">
</div>

<div class="pagina">
<img src="https://via.placeholder.com/800x1200?text=Página+3">
</div>

</div>


</body>
</html>
