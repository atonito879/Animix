<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Leitor</title>

<style>

body {
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}


header {
    background:#222;
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
}


h1 {
    color:#ffcc00;
}


.controles {
    text-align:center;
    padding:15px;
}


button {

    background:#ffcc00;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;

}


a {

    text-decoration:none;

}


.voltar {

    background:white;
    color:#111;
    padding:10px;
    border-radius:8px;

}


.leitor {

    max-width:900px;
    margin:auto;

}


.pagina {

    margin-bottom:15px;
    text-align:center;

}


.pagina img {

    width:100%;
    display:block;

}

</style>

</head>


<body>


<header>

<h1>📖 Animix</h1>

<h2 id="titulo"></h2>

</header>



<div class="controles">


<button onclick="anterior()">
⬅ Anterior
</button>



<button onclick="proximo()">
Próximo ➡
</button>


<br><br>


<a class="voltar" href="index.html">
🏠 Início
</a>


</div>



<div class="leitor" id="leitor">

</div>




<script src="dados.js"></script>



<script>


let url =
new URLSearchParams(window.location.search);



let id =
Number(url.get("id")) || 0;



let cap =
Number(url.get("cap")) || 1;



let manga =
mangas[id];




document.getElementById("titulo").innerHTML =

manga.nome + " - Capítulo " + cap;




let leitor =
document.getElementById("leitor");



let paginas = [


"Página 1",

"Página 2",

"Página 3"


];




paginas.forEach(function(pagina){



leitor.innerHTML += `


<div class="pagina">


<img src="https://via.placeholder.com/800x1200?text=${manga.nome}+${pagina}">


</div>


`;



});







function proximo(){


cap++;


window.location.href =
"leitor.html?id="+id+"&cap="+cap;


}





function anterior(){


if(cap>1){


cap--;


window.location.href =
"leitor.html?id="+id+"&cap="+cap;


}


}



</script>


</body>

</html>
