<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Leitor</title>

<style>

body{

margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;

}


header{

background:#222;
padding:20px;
text-align:center;

}


h1{

color:#ffcc00;

}



.controles{

text-align:center;
padding:15px;

}



button{

background:#ffcc00;
color:#111;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}



a{

text-decoration:none;

}



.leitor{

max-width:900px;
margin:auto;

}



.pagina img{

width:100%;
display:block;
margin-bottom:15px;

}


.voltar{

background:white;
color:#111;
padding:10px;
border-radius:8px;

}


</style>


</head>


<body>




<header>


<h1>📖 Animix</h1>


<h2 id="titulo"></h2>


</header>




<div class="controles">


<button onclick="anterior()">

⬅ Anterior

</button>


<button onclick="proximo()">

Próximo ➡

</button>


<br><br>


<a class="voltar" href="index.html">

🏠 Início

</a>


</div>




<div class="leitor" id="leitor">

</div>







<script src="dados.js"></script>




<script>



let url =
new URLSearchParams(window.location.search);



let id =
Number(url.get("id"));



let cap =
Number(url.get("cap"));



let manga =
mangas[id];





// SALVA HISTÓRICO


let historico = {


manga:manga.nome,


id:id,


capitulo:cap,


data:new Date().toLocaleString()


};



localStorage.setItem(

"ultimoLido",

JSON.stringify(historico)

);






document.getElementById("titulo").innerHTML =

manga.nome+
" - Capítulo "+
cap;





let capitulo =

manga.capitulos.find(

item=>item.numero===cap

);






let leitor =

document.getElementById("leitor");





capitulo.paginas.forEach(function(pagina,index){



leitor.innerHTML += `


<div class="pagina">


<p>

Página ${index+1}

</p>



<img src="${pagina}">


</div>


`;



});







function proximo(){



let existe =

manga.capitulos.find(

item=>item.numero===cap+1

);



if(existe){



location.href=

"leitor.html?id="+id+"&cap="+(cap+1);



}

else{


alert("Último capítulo");


}


}







function anterior(){



if(cap>1){



location.href=

"leitor.html?id="+id+"&cap="+(cap-1);



}



}



</script>



</body>

</html>
