<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Leitor</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="progresso">

<div id="barra" class="progresso-barra"></div>

</div>



<header>

<div class="logo">

📖 Animix

</div>


<h2 id="titulo"></h2>


</header>





<div class="container">


<div class="controles-leitor">


<a id="voltar">

<button>

⬅ Mangá

</button>

</a>


<button onclick="anterior()">

⬅ Capítulo

</button>



<button onclick="proximo()">

Próximo ➡

</button>


</div>





<div id="leitor" class="leitor">


</div>


</div>







<nav class="menu-fixo">


<a class="menu-item" href="index.html">

<span>🏠</span>

Início

</a>


<a class="menu-item" href="favoritos.html">

<span>⭐</span>

Favoritos

</a>


<a class="menu-item" href="biblioteca.html">

<span>📚</span>

Biblioteca

</a>


<a class="menu-item" href="perfil.html">

<span>👤</span>

Perfil

</a>


</nav>







<script src="js/dados.js"></script>

<script src="js/app.js"></script>




<script>



let url =

new URLSearchParams(

window.location.search

);




let id =

Number(

url.get("id")

);



let cap =

Number(

url.get("cap")

);






let manga =

mangas.find(

m =>

m.id === id

);





let capitulo =

manga.capitulos.find(

c =>

c.numero === cap

);






document.getElementById(

"titulo"

).innerHTML =


manga.nome +

" - Capítulo " +

cap;





document.getElementById(

"voltar"

).href =

"manga.html?id="+id;






let leitor =

document.getElementById(

"leitor"

);






capitulo.paginas.forEach(function(pagina,index){



leitor.innerHTML +=


`

<div class="pagina">


<img src="${pagina}">


<p>

Página ${index+1}

</p>


</div>


`;



});







// salvar progresso


salvarLeitura(

id,

cap

);








function proximo(){



let proximo =

cap + 1;



let existe =

manga.capitulos.find(

c =>

c.numero === proximo

);




if(existe){


window.location.href =

"leitor.html?id="+id+"&cap="+proximo;


}

else{


alert(

"Último capítulo"

);


}



}






function anterior(){



let ant =

cap - 1;



let existe =

manga.capitulos.find(

c =>

c.numero === ant

);




if(existe){



window.location.href =

"leitor.html?id="+id+"&cap="+ant;



}

else{


alert(

"Primeiro capítulo"

);


}



}







window.onscroll=function(){



let altura =

document.documentElement.scrollHeight -

document.documentElement.clientHeight;



let atual =

window.scrollY;



let porcentagem =

(atual / altura) * 100;




document.getElementById(

"barra"

).style.width =

porcentagem+"%";



}





</script>


</body>

</html>
