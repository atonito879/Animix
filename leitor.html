<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Leitor</title>


<style>

body {

    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;

}


header {

    background:#222;
    padding:20px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:10;

}


h1 {

    color:#ffcc00;

}


.controles {

    text-align:center;
    padding:15px;

}



button {

    background:#ffcc00;
    color:#111;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;

}



a {

    text-decoration:none;

}


.voltar {

    background:white;
    color:#111;
    padding:10px 15px;
    border-radius:8px;

}



.leitor {

    max-width:900px;
    margin:auto;

}



.pagina {

    margin-bottom:15px;
    text-align:center;

}



.pagina img {

    width:100%;
    display:block;

}


</style>


</head>


<body>



<header>

<h1>📖 Animix</h1>

<h2 id="titulo"></h2>

</header>




<div class="controles">


<button onclick="capAnterior()">

⬅ Capítulo anterior

</button>



<button onclick="proximoCap()">

Próximo capítulo ➡

</button>



<br><br>


<a class="voltar" href="index.html">

🏠 Início

</a>



</div>




<div class="leitor" id="leitor">


</div>






<script src="dados.js"></script>


<script>


let url =
new URLSearchParams(window.location.search);



let id =
Number(url.get("id"));



let cap =
Number(url.get("cap"));



let manga =
mangas[id];



let capitulo =
manga.capitulos.find(
item=>item.numero===cap
);




document.getElementById("titulo").innerHTML =

manga.nome +
" - Capítulo " +
cap;





let leitor =
document.getElementById("leitor");





capitulo.paginas.forEach(function(pagina,index){



leitor.innerHTML += `


<div class="pagina">


<p>
Página ${index+1}
</p>


<img src="${pagina}">


</div>


`;



});






function proximoCap(){



let proximo =
manga.capitulos.find(
item=>item.numero===cap+1
);



if(proximo){


window.location.href =
"leitor.html?id="+id+"&cap="+(cap+1);


}



else{


alert("Último capítulo");


}


}






function capAnterior(){



let anterior =
manga.capitulos.find(
item=>item.numero===cap-1
);



if(anterior){


window.location.href =
"leitor.html?id="+id+"&cap="+(cap-1);


}



}



</script>




</body>

</html>
