<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Favoritos</title>


<style>

body {

    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;

}


header {

    background:#222;
    padding:20px;
    text-align:center;

}


h1 {

    color:#ffcc00;

}



.catalogo {

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;

}



.card {

    background:#222;
    width:200px;
    padding:15px;
    border-radius:12px;
    text-align:center;

}



.card img {

    width:180px;
    height:260px;
    object-fit:cover;
    border-radius:10px;

}



button {

    background:#ffcc00;
    color:#111;
    border:none;
    padding:10px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;

}



.remover {

    background:#b00020;
    color:white;

}



a {

    text-decoration:none;

}



.voltar {

    display:block;
    text-align:center;
    color:white;
    margin:20px;

}


</style>


</head>



<body>



<header>

<h1>⭐ Meus Favoritos</h1>

</header>




<div class="catalogo" id="lista">

</div>




<a class="voltar" href="index.html">

⬅ Voltar ao catálogo

</a>






<script src="dados.js"></script>



<script>



let lista =
document.getElementById("lista");



let favoritos =
JSON.parse(localStorage.getItem("favoritos")) || [];





if(favoritos.length === 0){


lista.innerHTML =
"<h2>Nenhum mangá favorito ainda</h2>";


}






favoritos.forEach(function(nome){



let manga =
mangas.find(
item=>item.nome===nome
);





if(manga){



lista.innerHTML += `


<div class="card">


<img src="${manga.capa}">


<h3>
${manga.nome}
</h3>



<a href="manga.html?id=${mangas.indexOf(manga)}">

<button>

📖 Abrir

</button>

</a>




<button 
class="remover"
onclick="remover('${manga.nome}')">

❌ Remover

</button>



</div>


`;



}



});






function remover(nome){



let favoritos =
JSON.parse(localStorage.getItem("favoritos")) || [];



favoritos =
favoritos.filter(
item=>item!==nome
);



localStorage.setItem(
"favoritos",
JSON.stringify(favoritos)
);



location.reload();



}



</script>



</body>

</html>
