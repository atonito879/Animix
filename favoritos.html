<script>


let todos = mangas.concat(

JSON.parse(localStorage.getItem("mangasAdmin")) || []

);



let favoritos = pegarFavoritos();



let area = document.getElementById("lista");





favoritos.forEach(function(id){



let manga = todos.find(

m => m.id == id

);



if(manga){


area.innerHTML += criarCard(manga);



}


});






if(area.innerHTML==""){


area.innerHTML =

`

<div class="lista-vazia">

Nenhum favorito ainda ⭐

</div>

`;


}
