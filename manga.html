<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Mangá</title>

<style>

body {
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}


header {
    background:#222;
    padding:20px;
    text-align:center;
}


h1 {
    color:#ffcc00;
}


.container {
    max-width:900px;
    margin:auto;
    padding:20px;
    text-align:center;
}


.capa {

    width:220px;
    height:320px;
    object-fit:cover;
    border-radius:10px;

}


.descricao {

    background:#222;
    padding:15px;
    border-radius:10px;
    margin:20px 0;

}


.capitulo {

    background:#222;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;

}


button {

    background:#ffcc00;
    color:#111;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;

}


.voltar {

    display:inline-block;
    margin-top:20px;
    background:white;
    color:#111;
    padding:10px 15px;
    border-radius:8px;

}


a {
    text-decoration:none;
}

</style>


</head>


<body>


<header>

<h1>📖 Animix</h1>

</header>




<div class="container" id="conteudo">

</div>




<script src="dados.js"></script>


<script>


let url =
new URLSearchParams(window.location.search);



let id =
Number(url.get("id"));



let manga =
mangas[id];



let conteudo =
document.getElementById("conteudo");



if(manga){



conteudo.innerHTML = `


<img class="capa" src="${manga.capa}">


<h2>${manga.nome}</h2>



<div class="descricao">

<p>
${manga.descricao}
</p>

</div>



<h2>Capítulos</h2>


<div id="lista"></div>



<a class="voltar" href="index.html">

⬅ Voltar

</a>


`;



let lista =
document.getElementById("lista");



manga.capitulos.forEach(function(cap){



lista.innerHTML += `


<div class="capitulo">


<span>
Capítulo ${cap}
</span>



<a href="leitor.html?id=${id}&cap=${cap}">


<button>
Ler
</button>


</a>


</div>


`;



});



}

else{


conteudo.innerHTML =
"<h2>Mangá não encontrado</h2>";


}


</script>



</body>

</html>
