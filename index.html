<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Mangás</title>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;
}


header{
background:#222;
padding:20px;
text-align:center;
}


h1{
color:#ffcc00;
}


.pesquisa{

width:80%;
max-width:500px;
padding:12px;
border-radius:8px;
border:none;

}


.menu{

text-align:center;
padding:15px;

}


.menu a{

color:white;
margin:8px;
text-decoration:none;

}


button{

background:#ffcc00;
color:#111;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}


.usuario{

background:#333;
padding:10px;
margin:10px;
border-radius:8px;

}



.secao{

padding:20px;

}



.continuar{

background:#222;
border-radius:12px;
padding:15px;
text-align:center;
max-width:400px;
margin:auto;

}



.catalogo{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;

}



.card{

background:#222;
width:200px;
padding:15px;
border-radius:12px;
text-align:center;

}



.card img{

width:180px;
height:260px;
object-fit:cover;
border-radius:10px;

}


.card h3{

color:#ffcc00;

}


</style>


</head>



<body>



<header>


<h1>📚 Animix</h1>



<div id="usuario" class="usuario">

</div>



<input
id="pesquisa"
class="pesquisa"
placeholder="🔎 Pesquisar mangá..."
onkeyup="buscar()"
>



</header>




<div class="menu">


<a href="index.html">
🏠 Início
</a>


<a href="favoritos.html">
⭐ Favoritos
</a>


<a href="login.html">
🔐 Login
</a>


<a href="admin.html">
⚙️ Admin
</a>


</div>






<div id="continuarArea"></div>






<div class="catalogo" id="catalogo">

</div>







<script src="dados.js"></script>



<script>





// HISTÓRICO DE LEITURA



let ultimo =

JSON.parse(

localStorage.getItem("ultimoLido")

);





if(ultimo){



document.getElementById("continuarArea").innerHTML = `



<div class="secao">


<h2>

📌 Continuar lendo

</h2>



<div class="continuar">


<h3>

${ultimo.manga}

</h3>



<p>

Capítulo ${ultimo.capitulo}

</p>



<a href="leitor.html?id=${ultimo.id}&cap=${ultimo.capitulo}">


<button>

▶ Continuar

</button>


</a>



</div>


</div>



`;



}







// CATÁLOGO



let lista = mangas;



let cadastrados =

JSON.parse(

localStorage.getItem("mangas")

) || [];



lista = lista.concat(cadastrados);






let catalogo =

document.getElementById("catalogo");





lista.forEach(function(manga,index){



catalogo.innerHTML += `


<div class="card">


<img src="${manga.capa}">


<h3>

${manga.nome}

</h3>


<p>

${manga.descricao}

</p>



<a href="manga.html?id=${index}">


<button>

📖 Ler

</button>


</a>



</div>


`;



});






// PESQUISA



function buscar(){



let texto =

document.getElementById("pesquisa")

.value

.toLowerCase();




let cards =

document.getElementsByClassName("card");





for(let i=0;i<cards.length;i++){



let nome =

cards[i]

.querySelector("h3")

.innerHTML

.toLowerCase();




cards[i].style.display =

nome.includes(texto)

?

"block"

:

"none";



}



}







// LOGIN



let logado =

localStorage.getItem("login");



let nome =

localStorage.getItem("nomeUsuario");




let area =

document.getElementById("usuario");





if(logado==="sim"){



area.innerHTML =

"👤 Olá "+nome+

" <button onclick='sair()'>Sair</button>";



}

else{


area.innerHTML =

"Faça login para salvar seu progresso";


}





function sair(){


localStorage.removeItem("login");

localStorage.removeItem("nomeUsuario");


location.reload();


}




</script>



</body>

</html>
