<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix Mangás</title>

<style>
body {
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header {
    background:#222;
    padding:20px;
    text-align:center;
}

h1 {
    color:#ffcc00;
}

.grid {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card {
    background:#222;
    width:200px;
    padding:15px;
    text-align:center;
    border-radius:10px;
}

.card img {
    width:170px;
    height:250px;
    object-fit:cover;
    border-radius:8px;
}

button {
    background:#ffcc00;
    border:0;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

a {
    text-decoration:none;
}
</style>

</head>

<body>

<header>
<h1>📚 Animix Mangás</h1>
<p>Leia seus mangás favoritos</p>
</header>


<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/170x250">
<h3>Mangá Exemplo</h3>
<a href="manga.html">

</a>
</div>


<div class="card">
<img src="https://via.placeholder.com/170x250">
<h3>Nova Aventura</h3>

</a>
</div>


</div>

</body>
</html>
