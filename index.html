<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>



<header>


<div class="logo">

📚 Animix

</div>


<div id="usuario" class="subtitulo">

</div>


<div class="area-pesquisa">

<input

id="pesquisa"

class="pesquisa"

placeholder="🔎 Pesquisar mangá..."

onkeyup="buscar()"

>

</div>


</header>





<div class="container">


<div id="continuar"></div>


<h2 class="titulo">

📚 Catálogo

</h2>


<div id="catalogo" class="catalogo">


</div>


</div>






<nav class="menu-fixo">


<a class="menu-item" href="index.html">

<span>🏠</span>

Início

</a>



<a class="menu-item" href="favoritos.html">

<span>⭐</span>

Favoritos

</a>



<a class="menu-item" href="biblioteca.html">

<span>📚</span>

Biblioteca

</a>



<a class="menu-item" href="perfil.html">

<span>👤</span>

Perfil

</a>



<a class="menu-item" href="admin.html">

<span>⚙️</span>

Admin

</a>


</nav>






<script src="js/dados.js"></script>

<script src="js/app.js"></script>



<script>


let lista = mangas.concat(
JSON.parse(localStorage.getItem("mangasAdmin")) || []
);



let catalogo = 

document.getElementById(
"catalogo"
);





lista.forEach(function(manga){



catalogo.innerHTML +=

criarCard(manga);



});







// =======================
// PESQUISA
// =======================


function buscar(){


let texto =

document
.getElementById(
"pesquisa"
)
.value
.toLowerCase();




let cards =

document
.querySelectorAll(
".card"
);




cards.forEach(function(card){



let nome =

card
.querySelector("h3")
.innerText
.toLowerCase();




if(nome.includes(texto)){


card.style.display="block";


}

else{


card.style.display="none";


}


});



}







// =======================
// USUARIO
// =======================


let usuario = pegarUsuario();



if(usuario){



document.getElementById(

"usuario"

).innerHTML =


"👤 Olá, "+usuario;



}

else{


document.getElementById(

"usuario"

).innerHTML =


"Entre para salvar seu progresso";


}







// =======================
// CONTINUAR LENDO
// =======================


let ultima = 

pegarUltimaLeitura();




if(ultima){



let manga =

mangas.find(

m =>

m.id == ultima.manga

);




if(manga){



document.getElementById(

"continuar"

).innerHTML =



`

<div class="continuar">


<h2>

📌 Continuar lendo

</h2>


<h3>

${manga.nome}

</h3>


<p>

Capítulo ${ultima.capitulo}

</p>



<a href="leitor.html?id=${manga.id}&cap=${ultima.capitulo}">


<button>

▶ Continuar

</button>


</a>


</div>

`;



}



}




</script>


</body>

</html>
