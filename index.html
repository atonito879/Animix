<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix</title>

<style>

body{
margin:0;
padding-bottom:90px;
background:#111;
color:white;
font-family:Arial,sans-serif;
}

header{
background:#222;
padding:20px;
text-align:center;
}

h1{
color:#ffcc00;
}

.pesquisa{
width:80%;
max-width:500px;
padding:12px;
border-radius:8px;
border:none;
}

.usuario{
background:#333;
padding:10px;
margin:10px;
border-radius:8px;
}

.catalogo{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:#222;
width:200px;
padding:15px;
border-radius:12px;
text-align:center;
}

.card img{
width:180px;
height:260px;
object-fit:cover;
border-radius:10px;
}

button{
background:#ffcc00;
color:#111;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.continuar{
background:#222;
margin:20px;
padding:15px;
border-radius:10px;
text-align:center;
}

.menu-fixo{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#222;
display:flex;
justify-content:space-around;
padding:10px 0;
z-index:999;
}

.menu-fixo a{
color:white;
text-decoration:none;
text-align:center;
font-size:12px;
}

</style>

</head>


<body>


<header>

<h1>📚 Animix</h1>


<div id="usuario" class="usuario"></div>


<input
id="pesquisa"
class="pesquisa"
placeholder="🔎 Pesquisar mangá..."
onkeyup="buscar()"
>

</header>



<div id="continuar"></div>


<div class="catalogo" id="catalogo"></div>





<div class="menu-fixo">


<a href="index.html">
🏠<br>
Início
</a>


<a href="favoritos.html">
⭐<br>
Favoritos
</a>


<a href="biblioteca.html">
📚<br>
Biblioteca
</a>


<a href="perfil.html">
👤<br>
Perfil
</a>


<a href="admin.html">
⚙️<br>
Admin
</a>


</div>






<script src="dados.js"></script>


<script>


let lista = [];


// Mangás fixos
if(typeof mangas !== "undefined"){

lista = mangas;

}


// Mangás criados pelo Admin

let cadastrados =

JSON.parse(

localStorage.getItem("mangas")

) || [];



lista = lista.concat(cadastrados);





let catalogo =

document.getElementById("catalogo");





lista.forEach(function(manga,index){


catalogo.innerHTML += `


<div class="card">


<img src="${manga.capa}">


<h3>${manga.nome}</h3>


<p>${manga.descricao || ""}</p>


<a href="manga.html?id=${index}">


<button>

📖 Ler

</button>


</a>


</div>


`;



});








// Continuar lendo


let ultimo =

JSON.parse(

localStorage.getItem("ultimoLido")

);



if(ultimo){



document.getElementById("continuar").innerHTML = `


<div class="continuar">


<h2>📌 Continuar lendo</h2>


<h3>${ultimo.manga}</h3>


<p>

Capítulo ${ultimo.capitulo}

</p>



<a href="leitor.html?id=${ultimo.id}&cap=${ultimo.capitulo}">


<button>

▶ Continuar

</button>


</a>



</div>


`;



}








function buscar(){


let texto =

document
.getElementById("pesquisa")
.value
.toLowerCase();



let cards =

document
.getElementsByClassName("card");



for(let i=0;i<cards.length;i++){



let nome =

cards[i]
.querySelector("h3")
.innerHTML
.toLowerCase();



cards[i].style.display =

nome.includes(texto)

?

"block"

:

"none";


}


}






let usuario =

localStorage.getItem("nomeUsuario");



if(usuario){


document.getElementById("usuario").innerHTML =

"👤 Olá, "+usuario;


}

else{


document.getElementById("usuario").innerHTML =

"Faça login para salvar seu progresso";


}



</script>


</body>

</html>
