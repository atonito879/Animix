<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Mangá</title>


<style>

body{

margin:0;
padding-bottom:80px;
background:#111;
color:white;
font-family:Arial,sans-serif;

}


header{

background:#222;
padding:20px;
text-align:center;

}


h1{

color:#ffcc00;

}



.container{

max-width:900px;
margin:auto;
padding:20px;
text-align:center;

}



.capa{

width:220px;
height:320px;
object-fit:cover;
border-radius:10px;

}



.descricao{

background:#222;
padding:15px;
border-radius:10px;
margin:20px 0;

}



button{

background:#ffcc00;
color:#111;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}



.capitulo{

background:#222;
padding:15px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;

}



.remover{

background:#c00000;
color:white;

}



.menu-fixo{

position:fixed;
bottom:0;
left:0;
width:100%;
background:#222;
display:flex;
justify-content:space-around;
padding:10px 0;
z-index:999;

}


.menu-fixo a{

color:white;
text-decoration:none;
text-align:center;
font-size:14px;

}



.voltar{

display:inline-block;
background:white;
color:#111;
padding:10px;
border-radius:8px;
margin-top:20px;

}



</style>


</head>


<body>




<header>

<h1>📖 Animix</h1>

</header>





<div class="container" id="conteudo">


</div>





<div class="menu-fixo">


<a href="index.html">
🏠<br>
Início
</a>


<a href="favoritos.html">
⭐<br>
Favoritos
</a>


<a href="biblioteca.html">
📚<br>
Biblioteca
</a>


<a href="perfil.html">
👤<br>
Perfil
</a>


</div>







<script src="dados.js"></script>


<script>



let url=

new URLSearchParams(window.location.search);



let id=

Number(url.get("id"));



let manga=

mangas[id];





let conteudo=

document.getElementById("conteudo");





if(manga){



conteudo.innerHTML=`

<img class="capa" src="${manga.capa}">


<h2>${manga.nome}</h2>


<div class="descricao">

${manga.descricao}

</div>



<h2>Capítulos</h2>


<div id="capitulos"></div>



<a class="voltar" href="index.html">

🏠 Início

</a>


`;




let lista=

document.getElementById("capitulos");




manga.capitulos.forEach(function(cap){



lista.innerHTML +=`


<div class="capitulo">


<span>

Capítulo ${cap.numero}

</span>



<a href="leitor.html?id=${id}&cap=${cap.numero}">


<button>

📖 Ler

</button>


</a>



</div>



`;



});



}

else{


conteudo.innerHTML=

"<h2>Mangá não encontrado</h2>";


}



</script>




</body>

</html>
