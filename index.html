<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Mangás</title>


<style>

body {
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
}


header {

    background:#222;
    padding:20px;
    text-align:center;

}


h1 {

    color:#ffcc00;
    font-size:35px;

}


.pesquisa {

    width:80%;
    max-width:500px;
    padding:12px;
    border-radius:8px;
    border:none;
    font-size:16px;

}



.menu {

    text-align:center;
    padding:15px;

}


.menu a {

    color:white;
    margin:10px;
    text-decoration:none;

}



.catalogo {

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;

}



.card {

    background:#222;
    width:200px;
    padding:15px;
    border-radius:12px;
    text-align:center;

}



.card img {

    width:180px;
    height:260px;
    object-fit:cover;
    border-radius:10px;

}



.card h3 {

    color:#ffcc00;

}



button {

    background:#ffcc00;
    color:#111;
    border:none;
    padding:10px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;

}



.favorito {

    background:#444;
    color:white;

}



a {

    text-decoration:none;

}


</style>


</head>


<body>


<header>


<h1>📚 Animix</h1>


<p>Leia seus mangás favoritos</p>



<input 
id="pesquisa"
class="pesquisa"
placeholder="🔎 Pesquisar mangá..."
onkeyup="buscar()"
>


</header>




<div class="menu">


<a href="index.html">
🏠 Início
</a>


<a href="favoritos.html">
⭐ Favoritos
</a>



</div>




<div class="catalogo" id="catalogo">






<div class="card">


<img src="https://via.placeholder.com/180x260">


<h3>
Mangá Exemplo
</h3>


<p>
Aventura e ação
</p>



<a href="manga.html">

<button>
📖 Ver mangá
</button>

</a>



<button 
class="favorito"
onclick="favoritar(
'Mangá Exemplo',
'https://via.placeholder.com/180x260',
'manga.html',
this
)">
⭐ Favoritar
</button>



</div>








<div class="card">


<img src="https://via.placeholder.com/180x260">


<h3>
Nova Aventura
</h3>


<p>
Fantasia e mistério
</p>



<a href="aventura.html">

<button>
📖 Ver mangá
</button>

</a>



<button 
class="favorito"
onclick="favoritar(
'Nova Aventura',
'https://via.placeholder.com/180x260',
'aventura.html',
this
)">
⭐ Favoritar
</button>



</div>








<div class="card">


<img src="https://via.placeholder.com/180x260">


<h3>
Samurai Lendário
</h3>


<p>
Batalhas épicas
</p>



<a href="samurai.html">

<button>
📖 Ver mangá
</button>

</a>



<button 
class="favorito"
onclick="favoritar(
'Samurai Lendário',
'https://via.placeholder.com/180x260',
'samurai.html',
this
)">
⭐ Favoritar
</button>



</div>





</div>







<script>



function buscar(){


let texto =
document
.getElementById("pesquisa")
.value
.toLowerCase();



let cards =
document
.getElementsByClassName("card");



for(let i=0;i<cards.length;i++){


let nome =
cards[i]
.querySelector("h3")
.innerHTML
.toLowerCase();



if(nome.includes(texto)){


cards[i].style.display="block";


}else{


cards[i].style.display="none";


}


}


}







function favoritar(nome,capa,link,botao){



let favoritos =
JSON.parse(localStorage.getItem("favoritos")) || [];



let existe =
favoritos.find(
item=>item.nome===nome
);



if(existe){


favoritos =
favoritos.filter(
item=>item.nome!==nome
);


botao.innerHTML="⭐ Favoritar";


}

else{


favoritos.push({

nome:nome,
capa:capa,
link:link

});


botao.innerHTML="❌ Remover";



}



localStorage.setItem(
"favoritos",
JSON.stringify(favoritos)
);



}




</script>




</body>

</html>
