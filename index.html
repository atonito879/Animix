<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Mangás</title>


<style>

body {
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}


header {

    background:#222;
    padding:20px;
    text-align:center;

}


h1 {

    color:#ffcc00;
    font-size:35px;

}



.pesquisa {

    width:80%;
    max-width:500px;
    padding:12px;
    border-radius:8px;
    border:none;

}



.menu {

    text-align:center;
    padding:15px;

}



.menu a {

    color:white;
    margin:10px;
    text-decoration:none;

}



.catalogo {

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;

}



.card {

    background:#222;
    width:200px;
    padding:15px;
    border-radius:12px;
    text-align:center;

}



.card img {

    width:180px;
    height:260px;
    object-fit:cover;
    border-radius:10px;

}



.card h3 {

    color:#ffcc00;

}



button {

    background:#ffcc00;
    color:#111;
    border:none;
    padding:10px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;

}



.favorito {

    background:#444;
    color:white;

}



</style>


</head>



<body>



<header>


<h1>📚 Animix</h1>


<p>Leia seus mangás favoritos</p>



<input
id="pesquisa"
class="pesquisa"
placeholder="🔎 Pesquisar mangá..."
onkeyup="buscar()"
>



</header>




<div class="menu">


<a href="index.html">

🏠 Início

</a>


<a href="favoritos.html">

⭐ Favoritos

</a>


</div>






<div class="catalogo" id="catalogo">


</div>







<script src="dados.js"></script>




<script>



let catalogo =
document.getElementById("catalogo");





mangas.forEach(function(manga,index){



catalogo.innerHTML += `


<div class="card">


<img src="${manga.capa}">


<h3>

${manga.nome}

</h3>


<p>

${manga.descricao}

</p>



<a href="manga.html?id=${index}">

<button>

📖 Ler

</button>

</a>




<button
class="favorito"
onclick="favoritar('${manga.nome}')">

⭐ Favoritar

</button>



</div>


`;



});







function buscar(){



let texto =
document
.getElementById("pesquisa")
.value
.toLowerCase();




let cards =
document
.getElementsByClassName("card");




for(let i=0;i<cards.length;i++){



let nome =
cards[i]
.querySelector("h3")
.innerHTML
.toLowerCase();




if(nome.includes(texto)){


cards[i].style.display="block";


}

else{


cards[i].style.display="none";


}


}


}







function favoritar(nome){



let favoritos =
JSON.parse(localStorage.getItem("favoritos")) || [];




if(!favoritos.includes(nome)){



favoritos.push(nome);



localStorage.setItem(
"favoritos",
JSON.stringify(favoritos)
);



alert("⭐ Adicionado aos favoritos");


}

else{


alert("Esse mangá já está nos favoritos");


}


}



</script>




</body>

</html>
