<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Perfil</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<div class="logo">

👤 Perfil

</div>

</header>




<div class="perfil" id="perfil">


</div>





<script src="js/app.js"></script>



<script>


let nome =

pegarUsuario();



let area =

document.getElementById(

"perfil"

);





if(nome){



let leitura =

pegarUltimaLeitura();



area.innerHTML =



`

<h2>

Olá, ${nome}

</h2>


<br>


<a href="favoritos.html">

<button>

⭐ Favoritos

</button>

</a>



<br><br>



<a href="biblioteca.html">

<button>

📚 Biblioteca

</button>

</a>


<br><br>



<button onclick="sairUsuario()">

Sair

</button>



`;



if(leitura){



area.innerHTML +=



`

<p>

Última leitura:

Capítulo ${leitura.capitulo}

</p>

`;



}



}

else{


area.innerHTML =


`

<h2>

Você não está logado

</h2>


<a href="login.html">

<button>

Entrar

</button>


</a>


`;



}



</script>


</body>

</html>
