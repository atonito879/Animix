<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Perfil</title>


<style>

body{

margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;

}


header{

background:#222;
padding:20px;
text-align:center;

}


h1{

color:#ffcc00;

}


.container{

max-width:500px;
margin:auto;
padding:20px;

}



.card{

background:#222;
padding:20px;
border-radius:12px;
margin-top:20px;
text-align:center;

}



button{

background:#ffcc00;
color:#111;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}



.sair{

background:#c00000;
color:white;

}



a{

text-decoration:none;
color:white;

}


</style>


</head>


<body>



<header>

<h1>👤 Meu Perfil</h1>

</header>




<div class="container">



<div class="card">


<h2 id="nome">

</h2>



<p id="status">

</p>



<hr>



<p>

⭐ Favoritos:

<span id="favoritos"></span>

</p>



<p>

📚 Biblioteca:

<span id="biblioteca"></span>

</p>



<p>

📌 Última leitura:

</p>



<p id="ultimo">

Nenhuma leitura

</p>




<button class="sair" onclick="sair()">

🚪 Sair da conta

</button>



<br><br>


<a href="index.html">

<button>

🏠 Início

</button>

</a>



</div>


</div>







<script>



let usuario =

localStorage.getItem("nomeUsuario");



if(usuario){


document.getElementById("nome").innerHTML =

"Olá, "+usuario;



document.getElementById("status").innerHTML =

"Conta ativa";


}

else{


document.getElementById("nome").innerHTML =

"Visitante";


document.getElementById("status").innerHTML =

"Você não está conectado";


}






let favoritos =

JSON.parse(

localStorage.getItem("favoritos")

) || [];



document.getElementById("favoritos").innerHTML =

favoritos.length;






let biblioteca =

JSON.parse(

localStorage.getItem("biblioteca")

) || [];



document.getElementById("biblioteca").innerHTML =

biblioteca.length;








let ultimo =

JSON.parse(

localStorage.getItem("ultimoLido")

);




if(ultimo){


document.getElementById("ultimo").innerHTML =


ultimo.manga+
" - Capítulo "+
ultimo.capitulo;


}







function sair(){



localStorage.removeItem("login");

localStorage.removeItem("nomeUsuario");



location.href="login.html";


}



</script>



</body>

</html>
