<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Admin</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<div class="logo">

⚙️ Animix Admin

</div>

</header>




<div class="admin-container">



<div class="admin-box">


<h2>

➕ Novo Mangá

</h2>



<input id="nome" placeholder="Nome do mangá">


<input id="autor" placeholder="Autor">


<input id="genero" placeholder="Gênero">


<input id="capa" placeholder="URL da capa">



<textarea id="descricao" placeholder="Descrição"></textarea>



<button onclick="adicionarManga()">

Salvar Mangá

</button>


</div>







<div class="admin-box">


<h2>

📖 Adicionar Capítulo

</h2>



<select id="listaMangas">

</select>



<input id="numeroCap" placeholder="Número do capítulo">


<textarea id="paginas"

placeholder="Cole as URLs das páginas separadas por vírgula">

</textarea>



<button onclick="adicionarCapitulo()">

Adicionar Capítulo

</button>



</div>







<div class="admin-box">


<h2>

📚 Mangás cadastrados

</h2>



<div id="lista">

</div>



</div>



</div>








<script src="js/dados.js"></script>

<script src="js/app.js"></script>






<script>



let cadastrados =

JSON.parse(

localStorage.getItem("mangasAdmin")

) || [];






function salvar(){


localStorage.setItem(

"mangasAdmin",

JSON.stringify(cadastrados)

);


}





function adicionarManga(){



let manga = {


id:

Date.now(),


nome:

nome.value,


autor:

autor.value,


genero:

genero.value,


capa:

capa.value,


descricao:

descricao.value,


capitulos:[]

};




cadastrados.push(manga);



salvar();



alert(

"Mangá cadastrado!"

);



location.reload();


}








function carregar(){



let select =

document.getElementById(

"listaMangas"

);




let lista =

document.getElementById(

"lista"

);






cadastrados.forEach(function(m){



select.innerHTML +=


`

<option value="${m.id}">

${m.nome}

</option>


`;




lista.innerHTML +=


`

<div class="admin-item">


<b>

${m.nome}

</b>


<br>


Capítulos:

${m.capitulos.length}



<button onclick="remover(${m.id})">

Excluir

</button>



</div>


`;



});



}







function adicionarCapitulo(){



let id =

Number(

listaMangas.value

);




let manga =

cadastrados.find(

m =>

m.id === id

);





let paginas =

document

.getElementById(

"paginas"

)

.value

.split(",")

.map(

p=>p.trim()

);





manga.capitulos.push({



numero:

Number(numeroCap.value),


titulo:

"Capítulo "+numeroCap.value,


paginas:paginas



});





salvar();



alert(

"Capítulo adicionado!"

);



location.reload();



}








function remover(id){



cadastrados =

cadastrados.filter(

m=>m.id!==id

);



salvar();



location.reload();


}





carregar();



</script>



</body>

</html>
