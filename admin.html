<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Admin</title>


<style>

body{

margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;

}


header{

background:#222;
padding:20px;
text-align:center;

}


h1{

color:#ffcc00;

}



.container{

max-width:600px;
margin:auto;
padding:20px;

}



input, textarea{

width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;

}



button{

background:#ffcc00;
color:#111;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}



.remover{

background:#c00000;
color:white;

}



.inicio{

background:white;
color:#111;
margin:10px;

}



.card{

background:#222;
padding:15px;
margin-top:15px;
border-radius:10px;

}



.card img{

width:120px;
border-radius:8px;

}



#painel{

display:none;

}


</style>


</head>



<body>




<header>

<h1>⚙️ Animix Admin</h1>

</header>





<div class="container">



<div id="login">


<h2>🔐 Login Admin</h2>


<input 
id="senha"
type="password"
placeholder="Digite a senha"
>


<button onclick="entrar()">

Entrar

</button>


<p id="erro"></p>



</div>







<div id="painel">



<a href="index.html">

<button class="inicio">

🏠 Início

</button>

</a>



<button onclick="sair()">

🚪 Sair

</button>





<h2>Novo Mangá</h2>



<input id="nome" placeholder="Nome do mangá">


<input id="capa" placeholder="Link da capa">


<textarea id="descricao" placeholder="Descrição"></textarea>


<input id="capitulos" placeholder="Capítulos exemplo: 1,2,3">



<button onclick="adicionar()">

Adicionar Mangá

</button>




<h2>Mangás cadastrados</h2>



<div id="lista"></div>



</div>




</div>







<script>



let senhaCorreta =
"animix123";




function entrar(){


let senha =
document.getElementById("senha").value;



if(senha===senhaCorreta){



localStorage.setItem(
"admin",
"sim"
);



mostrarPainel();



}

else{


document.getElementById("erro").innerHTML =
"❌ Senha incorreta";


}


}






function mostrarPainel(){



document.getElementById("login").style.display="none";


document.getElementById("painel").style.display="block";


mostrar();


}




function sair(){


localStorage.removeItem("admin");


location.reload();


}





if(localStorage.getItem("admin")==="sim"){


mostrarPainel();


}






let mangas =
JSON.parse(localStorage.getItem("mangas")) || [];







function adicionar(){



let manga={



nome:
document.getElementById("nome").value,


capa:
document.getElementById("capa").value,


descricao:
document.getElementById("descricao").value,


capitulos:
document.getElementById("capitulos").value.split(",")



};





mangas.push(manga);



localStorage.setItem(
"mangas",
JSON.stringify(mangas)
);



mostrar();



}






function mostrar(){



let lista =
document.getElementById("lista");



lista.innerHTML="";



mangas.forEach(function(manga,index){



lista.innerHTML += `



<div class="card">


<img src="${manga.capa}">


<h3>${manga.nome}</h3>


<p>${manga.descricao}</p>



<button 
class="remover"
onclick="remover(${index})">

❌ Remover

</button>



</div>


`;



});



}






function remover(index){



if(confirm("Remover este mangá?")){


mangas.splice(index,1);



localStorage.setItem(
"mangas",
JSON.stringify(mangas)
);



mostrar();


}



}



</script>



</body>

</html>
