<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Admin</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<div class="logo">

⚙️ Animix Admin

</div>


<a href="index.html">

<button>

🏠 Início

</button>

</a>


</header>





<div id="loginAdmin" class="formulario">


<h2 class="titulo">

🔐 Acesso Admin

</h2>


<input 
type="password"
id="senhaAdmin"
placeholder="Senha do administrador"
>



<button onclick="entrarAdmin()">

Entrar

</button>



</div>








<div id="painelAdmin" class="admin-container" style="display:none;">





<div class="admin-box">


<h2>

➕ Cadastrar Mangá

</h2>



<input 
id="nome"
placeholder="Nome do mangá"
>



<input 
id="autor"
placeholder="Autor"
>



<input 
id="genero"
placeholder="Gênero"
>



<input 
id="capa"
placeholder="URL da capa"
>



<textarea 
id="descricao"
placeholder="Descrição do mangá">
</textarea>




<button onclick="adicionarManga()">

Salvar Mangá

</button>



</div>







<div class="admin-box">


<h2>

📖 Novo Capítulo

</h2>




<select id="selecionarManga">

</select>




<input 
id="numeroCapitulo"
placeholder="Número do capítulo"
>




<textarea 
id="paginasCapitulo"
placeholder="Cole as URLs das páginas separadas por vírgula">
</textarea>




<button onclick="adicionarCapitulo()">

Adicionar Capítulo

</button>



</div>






<div class="admin-box">


<h2>

📚 Mangás cadastrados

</h2>



<div id="listaMangas">

</div>



</div>



</div>





<script src="js/dados.js"></script>

<script src="js/app.js"></script>
<script>


const SENHA_ADMIN = "admin123";



function entrarAdmin(){


let senha =

document.getElementById(
"senhaAdmin"
).value;




if(senha === SENHA_ADMIN){


localStorage.setItem(
"adminLogado",
"true"
);



mostrarPainel();



}

else{


alert(
"Senha incorreta!"
);


}


}






function mostrarPainel(){



document.getElementById(

"loginAdmin"

).style.display="none";



document.getElementById(

"painelAdmin"

).style.display="block";



carregarMangas();


}





if(localStorage.getItem("adminLogado")){


mostrarPainel();


}







let listaAdmin =

JSON.parse(

localStorage.getItem("mangasAdmin")

) || [];






function salvarDados(){



localStorage.setItem(

"mangasAdmin",

JSON.stringify(listaAdmin)

);



}







function adicionarManga(){



let novo = {


id: Date.now(),


nome:

document.getElementById(
"nome"
).value,


autor:

document.getElementById(
"autor"
).value,


genero:

document.getElementById(
"genero"
).value,


capa:

document.getElementById(
"capa"
).value,


descricao:

document.getElementById(
"descricao"
).value,


capitulos:[]



};





listaAdmin.push(novo);



salvarDados();



alert(
"Mangá cadastrado!"
);



limparCampos();



carregarMangas();



}







function carregarMangas(){



let select =

document.getElementById(
"selecionarManga"
);



let lista =

document.getElementById(
"listaMangas"
);




select.innerHTML="";

lista.innerHTML="";





listaAdmin.forEach(function(manga){





select.innerHTML +=


`

<option value="${manga.id}">

${manga.nome}

</option>


`;







lista.innerHTML +=


`

<div class="admin-item">


<h3>

${manga.nome}

</h3>



<p>

Capítulos:
${manga.capitulos.length}

</p>



<button onclick="excluirManga(${manga.id})">

🗑 Excluir

</button>



</div>


`;




});



}






function limparCampos(){



nome.value="";

autor.value="";

genero.value="";

capa.value="";

descricao.value="";


}







function excluirManga(id){



if(confirm("Excluir este mangá?")){


listaAdmin =

listaAdmin.filter(

m=>m.id != id

);



salvarDados();


carregarMangas();


}



}
function adicionarCapitulo(){



let id =

Number(

document.getElementById(

"selecionarManga"

).value

);





let manga =

listaAdmin.find(

m =>

m.id === id

);






if(!manga){


alert(

"Selecione um mangá"

);


return;


}






let paginas =

document.getElementById(

"paginasCapitulo"

)

.value

.split(",")

.map(

p => p.trim()

)

.filter(

p => p !== ""

);







let capitulo = {


numero:

Number(

document.getElementById(

"numeroCapitulo"

).value

),



titulo:

"Capítulo " +

document.getElementById(

"numeroCapitulo"

).value,



paginas:paginas



};






manga.capitulos.push(

capitulo

);



salvarDados();



alert(

"Capítulo adicionado!"

);



document.getElementById(

"numeroCapitulo"

).value="";



document.getElementById(

"paginasCapitulo"

).value="";



carregarMangas();



}







function sairAdmin(){



localStorage.removeItem(

"adminLogado"

);



location.reload();



}



</script>





</body>

</html>
