<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Teste MangaDex</title>

<style>

body{
font-family:Arial;
padding:20px;
}

input,button{
padding:10px;
font-size:16px;
}

.card{
border:1px solid #ccc;
padding:15px;
margin-top:15px;
display:flex;
gap:20px;
align-items:flex-start;
}

img{
width:120px;
height:170px;
object-fit:cover;
}

</style>

</head>

<body>

<h1>🔎 Teste MangaDex</h1>

<input
id="busca"
placeholder="Digite o nome do mangá"
>

<button onclick="pesquisar()">
Buscar
</button>

<div id="resultado"></div>

<script src="js/mangadex.js"></script>

<script>

async function pesquisar(){

    const nome = document.getElementById("busca").value.trim();

    const area = document.getElementById("resultado");

    if(!nome){
        area.innerHTML = "Digite um título.";
        return;
    }

    area.innerHTML = "Buscando...";

    const mangas = await buscarMangaDex(nome);

    area.innerHTML = "";

    if(mangas.length === 0){
        area.innerHTML = "Nenhum mangá encontrado.";
        return;
    }

    for(const manga of mangas){

        const dados = dadosMangaDex(manga);

        const capa = pegarCapaMangaDex(manga);

        area.innerHTML += `
        <div class="card">

            <img
                src="${capa}"
                onerror="this.src='img/sem-capa.jpg'"
            >

            <div>

                <h2>${dados.nome}</h2>

                <p>${dados.descricao.substring(0,200)}</p>

                <p><strong>Gêneros:</strong> ${dados.generos.join(", ")}</p>

            </div>

        </div>
        `;

    }

}

</script>

</body>

</html>
