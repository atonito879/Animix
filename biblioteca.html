<script>



let todos = mangas.concat(

JSON.parse(

localStorage.getItem("mangasAdmin")

) || []

);





let biblioteca =

pegarBiblioteca();





let area =

document.getElementById(

"lista"

);





biblioteca.forEach(function(id){



let manga =

todos.find(

m=>m.id==id

);




if(manga){



area.innerHTML +=

criarCard(manga);



}


});






if(area.innerHTML==""){



area.innerHTML =


`

<div class="lista-vazia">

Sua biblioteca está vazia 📚

</div>


`;



}




</script>
