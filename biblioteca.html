<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animix - Minha Biblioteca</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;
}


header{
background:#222;
padding:20px;
text-align:center;
}


h1{
color:#ffcc00;
}


.catalogo{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;

}


.card{

background:#222;
width:200px;
padding:15px;
border-radius:12px;
text-align:center;

}


.card img{

width:180px;
height:260px;
object-fit:cover;
border-radius:10px;

}


button{

background:#ffcc00;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}


.remover{

background:#c00000;
color:white;

}


a{

text-decoration:none;
color:white;

}


</style>

</head>


<body>


<header>

<h1>📚 Minha Biblioteca</h1>

</header>




<div class="catalogo" id="lista">

</div>




<a href="index.html">

<button>

🏠 Início

</button>

</a>





<script src="dados.js"></script>


<script>


let biblioteca =

JSON.parse(

localStorage.getItem("biblioteca")

) || [];




let lista =

document.getElementById("lista");





biblioteca.forEach(function(nome){



let manga =

mangas.find(

item=>item.nome===nome

);



if(manga){



let id = mangas.indexOf(manga);



lista.innerHTML += `


<div class="card">


<img src="${manga.capa}">


<h3>

${manga.nome}

</h3>



<a href="manga.html?id=${id}">


<button>

📖 Ler

</button>


</a>



<button

class="remover"

onclick="remover('${manga.nome}')">

❌ Remover

</button>



</div>


`;



}



});








function remover(nome){



biblioteca =

biblioteca.filter(

item=>item!==nome

);



localStorage.setItem(

"biblioteca",

JSON.stringify(biblioteca)

);



location.reload();



}




</script>



</body>

</html>
